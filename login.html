<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PILOT LOGIN - STRIKER 1945</title>
    <link rel="stylesheet" href="login.css"> </head>
<body class="arcade-theme">
    <main class="form-box">
        <header>
            <h2 class="glitch" data-text="PILOT LOGIN">PILOT LOGIN</h2>
            <p class="blink-text">READY? PLAYER 1</p>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <label for="loginId">ID</label>
                <input type="text" id="loginId" required placeholder="Enter ID">
            </div>
            <div class="input-group">
                <label for="loginPw">PASSWORD</label>
                <input type="password" id="loginPw" required placeholder="Enter Password">
            </div>
            
            <button type="submit" class="btn-retro">ENGAGE</button>
        </form>

        <footer>
            <a href="signup.html" class="link-signup">New Pilot? START MISSION (Sign Up)</a>
        </footer>
    </main>
    <script src="login.js"></script>
</body>
</html>
